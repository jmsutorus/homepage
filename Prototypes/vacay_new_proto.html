<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Curation — New Vacation Plan</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#2b2d1d",
                    "on-background": "#1a1c1a",
                    "primary-fixed-dim": "#b4cdb8",
                    "on-tertiary-container": "#93947f",
                    "on-tertiary": "#ffffff",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f4f3f1",
                    "secondary": "#9f402d",
                    "surface-tint": "#4d6453",
                    "inverse-primary": "#b4cdb8",
                    "on-primary-fixed": "#0b2013",
                    "surface-container-highest": "#e3e2e0",
                    "secondary-fixed-dim": "#ffb4a5",
                    "on-primary-container": "#819986",
                    "on-surface": "#1a1c1a",
                    "secondary-container": "#fd876f",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed": "#1b1d0e",
                    "tertiary-fixed-dim": "#c8c8b0",
                    "secondary-fixed": "#ffdad3",
                    "inverse-on-surface": "#f2f1ee",
                    "outline-variant": "#c3c8c1",
                    "on-secondary-fixed-variant": "#802918",
                    "surface-variant": "#e3e2e0",
                    "error": "#ba1a1a",
                    "tertiary-fixed": "#e4e4cc",
                    "on-error": "#ffffff",
                    "background": "#faf9f6",
                    "surface-dim": "#dbdad7",
                    "inverse-surface": "#2f312f",
                    "on-surface-variant": "#434843",
                    "on-secondary-fixed": "#3e0500",
                    "tertiary": "#17180a",
                    "surface-container": "#efeeeb",
                    "primary-container": "#1b3022",
                    "on-error-container": "#93000a",
                    "primary-fixed": "#d0e9d4",
                    "on-tertiary-fixed-variant": "#474836",
                    "on-secondary": "#ffffff",
                    "surface": "#faf9f6",
                    "surface-container-high": "#e9e8e5",
                    "surface-bright": "#faf9f6",
                    "primary": "#061b0e",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#732010",
                    "on-primary-fixed-variant": "#364c3c",
                    "outline": "#737973"
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Lexend"],
                    "display": ["Lexend"],
                    "body": ["Lexend"],
                    "label": ["Lexend"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Lexend', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.2) sepia(0.5) saturate(5) hue-rotate(340deg);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen pb-32">
<main class="pt-24 px-6 max-w-5xl mx-auto">
<!-- Hero Section Asymmetry -->
<section class="grid grid-cols-1 md:grid-cols-12 gap-8 mb-16">
<div class="md:col-span-7 flex flex-col justify-end py-8">
<h1 class="text-5xl md:text-7xl font-bold text-primary tracking-tight leading-none mb-6">
                    New <br/><span class="text-secondary italic">Curated</span> Journey
                </h1>
<p class="text-on-surface-variant text-lg max-w-md">
                    Capture the essence of your next escape. Define the mood, the movement, and the memory.
                </p>
</div>
<div class="md:col-span-5 relative group cursor-pointer overflow-hidden rounded-xl bg-surface-container-low aspect-[4/5] flex items-center justify-center">
<div class="absolute inset-0 bg-primary/5 group-hover:bg-primary/0 transition-colors z-10"></div>
<img class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" data-alt="cinematic shot of tuscan hills with a solitary villa under soft amber sunset lighting and rolling fog" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUOz8wdUO1vKCCy_2TK3AHoXxfUE_X8OzH7Rknw0tWmktrvDGDinh9qCOg7jDtmbDWZj96SFQSqTVf24WbkxNEAEhMnjRTFFokF6C5cu6m-HEu57i4Y749kT2xPlDfJlHM_5CRnmuBp-g7Up7v73jSfbcGLeruLnxFdoQLqyQ-_EsGf0Y_368b5amW68Qyy7978ygbSlhSNNunnhFCyiddFgb3kZfOXDnqMhhIWHFNDXBzxteeo5jMyYK1XggrKrYRZ-fqBPyD_Kc"/>
<div class="relative z-20 flex flex-col items-center gap-2 text-white opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-4xl">add_a_photo</span>
<span class="font-label text-sm uppercase tracking-widest">Change Hero</span>
</div>
</div>
</section>
<!-- Form Canvas -->
<form class="space-y-16">
<!-- Section: General Info -->
<section>
<div class="flex items-baseline gap-4 mb-8">
<span class="text-secondary font-bold text-sm tracking-widest uppercase">01</span>
<h2 class="text-2xl font-bold text-primary tracking-tight">General Info</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
<div class="space-y-2">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant px-1">Trip Title</label>
<input class="w-full bg-surface-container-low border-none rounded-lg p-4 text-primary font-medium focus:ring-0 focus:bg-surface-container-high transition-all" placeholder="Summer in Tuscany 2024" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant px-1">Destination</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg p-4 pl-12 text-primary font-medium focus:ring-0 focus:bg-surface-container-high transition-all" placeholder="Italy" type="text"/>
<span class="material-symbols-outlined absolute left-4 top-4 text-outline">location_on</span>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant px-1">Trip Type</label>
<select class="w-full bg-surface-container-low border-none rounded-lg p-4 text-primary font-medium focus:ring-0 focus:bg-surface-container-high transition-all appearance-none">
<option>Adventure</option>
<option>Relaxing</option>
<option>Cultural</option>
<option>Business</option>
</select>
</div>
<div class="space-y-2">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant px-1">Status</label>
<div class="flex gap-2">
<button class="flex-1 py-3 px-4 rounded-lg bg-primary text-white text-sm font-medium" type="button">Planning</button>
<button class="flex-1 py-3 px-4 rounded-lg bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-colors" type="button">Completed</button>
</div>
</div>
</div>
</section>
<!-- Section: Logistics -->
<section>
<div class="flex items-baseline gap-4 mb-8">
<span class="text-secondary font-bold text-sm tracking-widest uppercase">02</span>
<h2 class="text-2xl font-bold text-primary tracking-tight">Logistics</h2>
</div>
<div class="bg-surface-container-low p-8 rounded-xl grid grid-cols-1 md:grid-cols-3 gap-8">
<div class="space-y-2">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant px-1">Start Date</label>
<input class="w-full bg-surface-container-lowest border-none rounded-lg p-4 text-primary font-medium focus:ring-0" type="date"/>
</div>
<div class="space-y-2">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant px-1">End Date</label>
<input class="w-full bg-surface-container-lowest border-none rounded-lg p-4 text-primary font-medium focus:ring-0" type="date"/>
</div>
<div class="space-y-2">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant px-1">Budget &amp; Currency</label>
<div class="flex gap-2">
<input class="flex-1 bg-surface-container-lowest border-none rounded-lg p-4 text-primary font-medium focus:ring-0" placeholder="5000" type="number"/>
<select class="w-24 bg-surface-container-lowest border-none rounded-lg p-4 text-primary font-medium focus:ring-0">
<option>EUR</option>
<option>USD</option>
<option>GBP</option>
</select>
</div>
</div>
</div>
</section>
<!-- Section: Personal Notes -->
<section>
<div class="flex items-baseline gap-4 mb-8">
<span class="text-secondary font-bold text-sm tracking-widest uppercase">03</span>
<h2 class="text-2xl font-bold text-primary tracking-tight">Personal Notes</h2>
</div>
<div class="space-y-8">
<div class="space-y-2">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant px-1">Description</label>
<textarea class="w-full bg-surface-container-low border-none rounded-lg p-6 text-primary font-medium focus:ring-0 focus:bg-surface-container-high transition-all resize-none" placeholder="Write your thoughts, bucket list items, and expectations..." rows="6"></textarea>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-12">
<div class="space-y-4">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant px-1">Rating Expectations</label>
<input class="w-full h-2 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-secondary" max="10" min="1" step="1" type="range"/>
<div class="flex justify-between text-xs font-bold text-on-surface-variant">
<span>1</span>
<span>Rating: 8/10</span>
<span>10</span>
</div>
</div>
<div class="space-y-4">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant px-1">Tags</label>
<div class="flex flex-wrap gap-2">
<span class="bg-tertiary-fixed text-on-tertiary-fixed-variant px-4 py-1 rounded-full text-sm font-medium">#nature</span>
<span class="bg-tertiary-fixed text-on-tertiary-fixed-variant px-4 py-1 rounded-full text-sm font-medium">#culture</span>
<span class="bg-surface-container-high text-on-surface-variant px-4 py-1 rounded-full text-sm font-medium flex items-center gap-1 cursor-pointer">
                                    Add Tag <span class="material-symbols-outlined text-sm">add</span>
</span>
</div>
</div>
</div>
</div>
</section>
<!-- Actions -->
<div class="flex flex-col md:flex-row justify-end items-center gap-6 pt-8">
<button class="text-on-surface-variant font-medium hover:text-primary transition-colors" type="button">Discard Draft</button>
<button class="w-full md:w-auto bg-secondary text-white px-12 py-4 rounded-lg font-bold text-lg shadow-xl shadow-secondary/10 hover:scale-105 transition-transform" type="submit">Save Journey</button>
</div>
</form>
</main>
</body></html>
