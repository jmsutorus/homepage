<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Income Source | Verdant Finance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#737973",
                        "on-secondary-container": "#732010",
                        "surface-container-highest": "#e3e2e0",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#2f312f",
                        "on-surface": "#1a1c1a",
                        "inverse-on-surface": "#f2f1ee",
                        "surface-container-low": "#f4f3f1",
                        "on-primary-fixed": "#0b2013",
                        "surface-container-high": "#e9e8e5",
                        "on-error": "#ffffff",
                        "surface-bright": "#faf9f6",
                        "on-primary-fixed-variant": "#364c3c",
                        "on-tertiary-fixed": "#1b1d0e",
                        "surface-container": "#efeeeb",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#434843",
                        "tertiary": "#17180a",
                        "primary-container": "#1b3022",
                        "error": "#ba1a1a",
                        "tertiary-container": "#2b2d1d",
                        "on-primary-container": "#819986",
                        "on-tertiary-fixed-variant": "#474836",
                        "surface": "#faf9f6",
                        "secondary-fixed": "#ffdad3",
                        "on-background": "#1a1c1a",
                        "surface-dim": "#dbdad7",
                        "primary-fixed": "#d0e9d4",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#93947f",
                        "secondary-container": "#fd876f",
                        "outline-variant": "#c3c8c1",
                        "background": "#faf9f6",
                        "surface-tint": "#4d6453",
                        "secondary": "#9f402d",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e3e2e0",
                        "primary": "#061b0e",
                        "secondary-fixed-dim": "#ffb4a5",
                        "on-secondary-fixed-variant": "#802918",
                        "on-secondary-fixed": "#3e0500",
                        "inverse-primary": "#b4cdb8",
                        "primary-fixed-dim": "#b4cdb8",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#c8c8b0",
                        "tertiary-fixed": "#e4e4cc",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Lexend"],
                        "body": ["Lexend"],
                        "label": ["Lexend"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Lexend', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-blur {
            backdrop-filter: blur(24px);
            background: rgba(250, 249, 246, 0.6);
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased">
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 kinetic-blur">
<!-- Modal Container -->
<div class="w-full max-w-2xl bg-surface-container-lowest shadow-[0_32px_64px_-12px_rgba(6,27,14,0.12)] rounded-xl overflow-hidden border border-outline-variant/10">
<!-- Modal Header -->
<div class="bg-primary-container px-8 py-10 flex flex-col gap-2 relative">
<div class="flex justify-between items-start">
<h2 class="text-3xl font-bold tracking-tight text-on-primary-container">Edit Income Source</h2>
<button class="text-on-primary-container/60 hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<p class="text-on-primary-container/80 text-sm max-w-md">Update your monthly recurring revenue details. Changes will reflect in your financial forecasts and budget allocations.</p>
<!-- Decorative element -->
<div class="absolute bottom-0 right-0 w-32 h-32 bg-secondary opacity-10 blur-3xl rounded-full translate-x-12 translate-y-12"></div>
</div>
<!-- Modal Content (Form) -->
<form class="p-8 space-y-8">
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Amount Field -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest font-bold text-secondary">Monthly Take-Home Amount</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold">$</span>
<input class="w-full pl-8 pr-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-0 focus:bg-surface-container-high transition-all text-primary font-bold text-lg" placeholder="0.00" type="number" value="4500.00"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-secondary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
<!-- Label Field -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Label</label>
<div class="relative group">
<input class="w-full px-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-0 focus:bg-surface-container-high transition-all text-primary font-medium" placeholder="e.g. Primary" type="text" value="Primary Salary"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-secondary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
<!-- Currency Dropdown -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Currency</label>
<div class="relative group">
<select class="w-full px-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-0 focus:bg-surface-container-high transition-all text-primary font-medium appearance-none">
<option selected="" value="USD">USD - United States Dollar</option>
<option value="EUR">EUR - Euro</option>
<option value="GBP">GBP - British Pound</option>
<option value="JPY">JPY - Japanese Yen</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-secondary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
<!-- Effective Date Picker -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Effective Since</label>
<div class="relative group">
<input class="w-full px-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-0 focus:bg-surface-container-high transition-all text-primary font-medium" type="date" value="2023-11-01"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-secondary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
</div>
<!-- Notes Textarea -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Notes</label>
<div class="relative group">
<textarea class="w-full px-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-0 focus:bg-surface-container-high transition-all text-primary font-medium resize-none" placeholder="Add any additional context..." rows="3">Standard salary deposit including health benefits and 401k matching contributions.</textarea>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-secondary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
<!-- Action Footer -->
<div class="flex items-center justify-end gap-6 pt-4">
<button class="px-8 py-4 text-sm font-bold tracking-widest uppercase text-on-surface-variant hover:text-primary transition-colors" type="button">
                        Cancel
                    </button>
<button class="px-10 py-4 bg-secondary text-on-secondary rounded-lg font-bold tracking-tight shadow-lg shadow-secondary/20 hover:scale-[1.02] active:scale-95 transition-all" type="submit">
                        Update Source
                    </button>
</div>
</form>
</div>
</div>
</body></html>
