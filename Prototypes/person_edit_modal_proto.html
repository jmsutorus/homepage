<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>David Martinez - The Earthbound Editorial</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#fd876f",
                    "on-background": "#1a1c1a",
                    "surface-container-highest": "#e3e2e0",
                    "background": "#faf9f6",
                    "inverse-surface": "#2f312f",
                    "surface-dim": "#dbdad7",
                    "primary-fixed": "#d0e9d4",
                    "on-surface": "#1a1c1a",
                    "on-secondary-fixed": "#3e0500",
                    "error-container": "#ffdad6",
                    "tertiary-fixed": "#e4e4cc",
                    "on-primary-fixed": "#0b2013",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#434843",
                    "primary": "#061b0e",
                    "surface-container-high": "#e9e8e5",
                    "on-tertiary-fixed-variant": "#474836",
                    "surface-variant": "#e3e2e0",
                    "secondary-fixed": "#ffdad3",
                    "primary-container": "#1b3022",
                    "surface": "#faf9f6",
                    "primary-fixed-dim": "#b4cdb8",
                    "on-primary": "#ffffff",
                    "tertiary": "#17180a",
                    "inverse-primary": "#b4cdb8",
                    "surface-container": "#efeeeb",
                    "tertiary-fixed-dim": "#c8c8b0",
                    "secondary-fixed-dim": "#ffb4a5",
                    "surface-tint": "#4d6453",
                    "surface-container-low": "#f4f3f1",
                    "secondary": "#9f402d",
                    "tertiary-container": "#2b2d1d",
                    "surface-bright": "#faf9f6",
                    "on-tertiary": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#802918",
                    "inverse-on-surface": "#f2f1ee",
                    "error": "#ba1a1a",
                    "outline-variant": "#c3c8c1",
                    "on-primary-fixed-variant": "#364c3c",
                    "outline": "#737973",
                    "on-primary-container": "#819986",
                    "on-tertiary-fixed": "#1b1d0e",
                    "on-tertiary-container": "#93947f",
                    "on-secondary-container": "#732010",
                    "on-secondary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Lexend"],
                    "body": ["Lexend"],
                    "label": ["Lexend"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Lexend', sans-serif; }
        .asymmetric-clip { clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%); }
        
        /* Custom scrollbar for the modal */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e3e2e0;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #c3c8c1;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32 overflow-hidden">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-primary/40 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
<!-- Redesigned Edit Person Modal -->
<div class="bg-surface w-full max-w-xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- Modal Header -->
<div class="px-8 py-6 border-b border-outline-variant/30 flex justify-between items-center bg-surface-container-low">
<div>
<h2 class="text-2xl font-bold text-primary tracking-tight">Edit Person</h2>
<p class="text-sm text-on-surface-variant font-medium">Curate the details of your connection.</p>
</div>
<button class="p-2 hover:bg-surface-container-highest rounded-full transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Form Area -->
<div class="flex-1 overflow-y-auto p-8 custom-scrollbar space-y-10">
<!-- Section: Basic Information -->
<div class="space-y-6">
<div class="flex items-center gap-2 border-b border-outline-variant/20 pb-2">
<span class="material-symbols-outlined text-secondary text-xl">person</span>
<h3 class="text-xs font-bold tracking-widest uppercase text-secondary">Basic Profile</h3>
</div>
<div class="grid grid-cols-1 gap-6">
<div class="space-y-1.5">
<label class="text-sm font-bold text-primary ml-1">Name <span class="text-secondary">*</span></label>
<input class="w-full bg-surface-container-low border-outline-variant/50 rounded-xl px-4 py-3 focus:ring-secondary focus:border-secondary transition-all outline-none" placeholder="Enter full name" type="text" value="James Sutorus"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-sm font-bold text-primary ml-1">Birthday <span class="text-secondary">*</span></label>
<div class="relative">
<input class="w-full bg-surface-container-low border-outline-variant/50 rounded-xl px-4 py-3 focus:ring-secondary focus:border-secondary transition-all outline-none" placeholder="DD-MMM-YYYY" type="text" value="25-Mar-1966"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant">calendar_today</span>
</div>
<label class="flex items-center gap-2 mt-2 cursor-pointer group">
<input class="rounded text-secondary focus:ring-secondary border-outline-variant" type="checkbox"/>
<span class="text-xs text-on-surface-variant group-hover:text-primary transition-colors">Year unknown</span>
</label>
</div>
<div class="space-y-1.5">
<label class="text-sm font-bold text-primary ml-1">Photo URL</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-outline-variant/50 rounded-xl px-4 py-3 focus:ring-secondary focus:border-secondary transition-all outline-none" placeholder="Image URL" type="text" value="https://res.cloudinary.com/..."/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant">image</span>
</div>
</div>
</div>
</div>
</div>
<!-- Section: Relationship -->
<div class="space-y-6">
<div class="flex items-center gap-2 border-b border-outline-variant/20 pb-2">
<span class="material-symbols-outlined text-secondary text-xl">favorite</span>
<h3 class="text-xs font-bold tracking-widest uppercase text-secondary">Relationship</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-sm font-bold text-primary ml-1">Category</label>
<select class="w-full bg-surface-container-low border-outline-variant/50 rounded-xl px-4 py-3 focus:ring-secondary focus:border-secondary transition-all outline-none appearance-none">
<option>Family</option>
<option>Friends</option>
<option>Professional</option>
</select>
</div>
<div class="space-y-1.5">
<label class="text-sm font-bold text-primary ml-1">Type</label>
<input class="w-full bg-surface-container-low border-outline-variant/50 rounded-xl px-4 py-3 focus:ring-secondary focus:border-secondary transition-all outline-none" placeholder="e.g., Father, Partner" type="text" value="Father"/>
</div>
</div>
<div class="bg-secondary-fixed/30 border border-secondary/10 rounded-xl p-4 flex items-center gap-4 group hover:bg-secondary-fixed/50 transition-colors">
<div class="relative w-6 h-6 flex items-center justify-center">
<input class="peer absolute inset-0 opacity-0 cursor-pointer z-10" type="checkbox"/>
<div class="w-6 h-6 border-2 border-secondary/40 rounded-md peer-checked:bg-secondary peer-checked:border-secondary transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm scale-0 peer-checked:scale-100 transition-transform" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="text-sm font-bold text-on-secondary-fixed-variant">Mark as Current Romantic Partner</span>
</div>
</div>
</div>
<!-- Section: Contact Details -->
<div class="space-y-6">
<div class="flex items-center gap-2 border-b border-outline-variant/20 pb-2">
<span class="material-symbols-outlined text-secondary text-xl">contact_page</span>
<h3 class="text-xs font-bold tracking-widest uppercase text-secondary">Contact Details</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-sm font-bold text-primary ml-1">Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-outline-variant/50 rounded-xl px-4 py-3 focus:ring-secondary focus:border-secondary transition-all outline-none" placeholder="john@example.com" type="email"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
</div>
</div>
<div class="space-y-1.5">
<label class="text-sm font-bold text-primary ml-1">Phone</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-outline-variant/50 rounded-xl px-4 py-3 focus:ring-secondary focus:border-secondary transition-all outline-none" placeholder="(555) 123-4567" type="tel"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant">call</span>
</div>
</div>
</div>
</div>
<!-- Section: Additional Notes -->
<div class="space-y-6">
<div class="flex items-center gap-2 border-b border-outline-variant/20 pb-2">
<span class="material-symbols-outlined text-secondary text-xl">event_note</span>
<h3 class="text-xs font-bold tracking-widest uppercase text-secondary">Anniversaries &amp; Notes</h3>
</div>
<div class="space-y-4">
<div class="space-y-1.5">
<label class="text-sm font-bold text-primary ml-1">Anniversary</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-outline-variant/50 rounded-xl px-4 py-3 focus:ring-secondary focus:border-secondary transition-all outline-none" placeholder="DD-MM-YYYY" type="text"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant">history</span>
</div>
</div>
<div class="space-y-1.5">
<label class="text-sm font-bold text-primary ml-1">Gift Ideas</label>
<textarea class="w-full bg-surface-container-low border-outline-variant/50 rounded-xl px-4 py-3 focus:ring-secondary focus:border-secondary transition-all outline-none resize-none" placeholder="Books, coffee, gadgets..." rows="2"></textarea>
</div>
<div class="space-y-1.5">
<label class="text-sm font-bold text-primary ml-1">Personal Notes</label>
<textarea class="w-full bg-surface-container-low border-outline-variant/50 rounded-xl px-4 py-3 focus:ring-secondary focus:border-secondary transition-all outline-none resize-none" placeholder="Additional thoughts or milestones..." rows="3"></textarea>
</div>
</div>
</div>
</div>
<!-- Modal Footer Actions -->
<div class="p-6 bg-surface-container-low border-t border-outline-variant/30 flex justify-end gap-3">
<button class="px-6 py-3 rounded-xl font-bold text-on-surface-variant hover:bg-surface-container-highest transition-colors">
                Cancel
            </button>
<button class="bg-secondary text-on-secondary px-10 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-secondary/20 hover:scale-[1.02] active:scale-[0.98] transition-all">
<span>Update Profile</span>
</button>
</div>
</div>
</div>
</body></html>
