name: Release
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write # for checkout
  issues: write # to be able to comment on released issues
  pull-requests: write # to be able to comment on released pull requests
  id-token: write # to enable use of OIDC for npm provenance

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: prod
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Trigger Firebase App Hosting Rollout
        run: |
          echo "Triggering Firebase App Hosting deployment..."
          firebase apphosting:rollouts:create homepage --project homepage-7cfc8 --git-branch main --force


  release:
    name: Release
    needs: deploy
    runs-on: ubuntu-latest
    environment: prod
    if: always() && (github.event_name == 'pull_request' || needs.deploy.result == 'success')
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
      actions: write # to be able to trigger the changelog sync workflow
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm clean-install

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate Release (Dry-run on PR)
        if: github.event_name == 'pull_request'
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (Create GitHub release)
        id: semantic
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Changelog to Hub
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git clone https://x-access-token:${{ secrets.HUB_TOKEN }}@github.com/jmsutorus/earthbound_changelog.git hub
          cp CHANGELOG.md hub/content/repos/earthbound_api/CHANGELOG.md
          cd hub
          git add .
          git commit -m "Update changelog for Earthbound API (v${{ steps.semantic.outputs.new_release_version }})"
          git push
        env:
          HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
