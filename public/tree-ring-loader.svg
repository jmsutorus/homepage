<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ring {
      fill: none;
      stroke-linecap: round;
      transform-origin: center;
      animation: rotate linear infinite;
      transition: stroke 0.3s ease;
    }
    .ring-0 { animation-duration: 18s; stroke-width: 1.2; }
    .ring-1 { animation-duration: 24s; animation-direction: reverse; stroke-width: 1.8; }
    .ring-2 { animation-duration: 30s; stroke-width: 1.5; }
    .ring-3 { animation-duration: 22s; animation-direction: reverse; stroke-width: 2; }
    .ring-4 { animation-duration: 35s; stroke-width: 2.2; }
    .ring-5 { animation-duration: 28s; animation-direction: reverse; stroke-width: 1.2; }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (prefers-color-scheme: dark) {
      .ring-0 { stroke: #2a4a3e; }
      .ring-1 { stroke: #3d6a4d; }
      .ring-2 { stroke: #8bb7a6; }
      .ring-3 { stroke: #e07a5f; }
      .ring-4 { stroke: #5e6c60; }
      .ring-5 { stroke: #fdfaf0; }
    }
  </style>
